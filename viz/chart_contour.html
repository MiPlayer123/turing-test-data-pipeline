<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversation Density Surface</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0D1117;
    color: #E6EDF3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  #container { width: 100%; height: 100%; }
  header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 18px 28px 12px; text-align: center;
    pointer-events: none; z-index: 10;
  }
  h1 { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8B949E; margin-bottom: 6px; }
  .insight { font-size: 12px; color: #F39C12; font-weight: 600; }
  .legend {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; z-index: 10; pointer-events: none;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #C9D1D9; }
  .legend-swatch { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <h1>Conversation Density Surface</h1>
  <p class="subtitle">KDE over repetitiveness (sqrt-scaled) &times; coherence &middot; 362 conversations &middot; height = density</p>
  <p class="insight">Peaks reveal where conversations cluster &mdash; rotate to explore</p>
</header>

<div id="container"></div>
<div class="legend" id="legend"></div>

<script>
const CONDITIONS = [
  { key: "human_human",            label: "Human-Human",     color: "#1ABC9C" },
  { key: "human_ai",               label: "Human-AI",        color: "#F1C40F" },
  { key: "ai_ai_freeform",         label: "AI Freeform",     color: "#3498DB" },
  { key: "ai_ai_freeform_persona", label: "AI Persona",      color: "#9B59B6" },
  { key: "ai_ai_detective",        label: "AI Detective",    color: "#E74C3C" },
  { key: "ai_ai_reverse_turing",   label: "AI Rev. Turing",  color: "#F39C12" },
  { key: "ai_ai_structured",       label: "AI Structured",   color: "#2ECC71" },
];
const COND_COLOR = Object.fromEntries(CONDITIONS.map(c => [c.key, c.color]));

// ======================================================================
// Gaussian KDE on a grid
// ======================================================================
function gaussianKDE(points, gridX, gridY, bandwidth) {
  const nx = gridX.length, ny = gridY.length;
  const grid = new Float64Array(nx * ny);
  const bw2 = bandwidth * bandwidth;
  const norm = 1 / (2 * Math.PI * bw2 * points.length);
  const cutoff = 9 * bw2;

  for (const [px, py] of points) {
    for (let ix = 0; ix < nx; ix++) {
      const dx = gridX[ix] - px;
      const dx2 = dx * dx;
      if (dx2 > cutoff) continue;
      for (let iy = 0; iy < ny; iy++) {
        const dy = gridY[iy] - py;
        const r2 = dx2 + dy * dy;
        if (r2 < cutoff) {
          grid[ix * ny + iy] += norm * Math.exp(-r2 / (2 * bw2));
        }
      }
    }
  }
  return grid;
}

// ======================================================================
// Color ramp — MATLAB parula-like: dark blue → cyan → yellow
// ======================================================================
function heightColor(t) {
  if (t < 0.25) {
    const s = t / 0.25;
    return new THREE.Color(0.07 + s * 0.0, 0.1 + s * 0.3, 0.4 + s * 0.3);
  } else if (t < 0.5) {
    const s = (t - 0.25) / 0.25;
    return new THREE.Color(0.07 + s * 0.05, 0.4 + s * 0.35, 0.7 - s * 0.05);
  } else if (t < 0.75) {
    const s = (t - 0.5) / 0.25;
    return new THREE.Color(0.12 + s * 0.5, 0.75 + s * 0.15, 0.65 - s * 0.35);
  } else {
    const s = (t - 0.75) / 0.25;
    return new THREE.Color(0.62 + s * 0.38, 0.9 + s * 0.1, 0.3 - s * 0.15);
  }
}

// ======================================================================
// Init
// ======================================================================
async function init() {
  const resp = await fetch("/data/processed/trajectories.json");
  const data = await resp.json();
  const convs = data.conversations;

  // sqrt-transform repetitiveness to spread the skewed distribution
  const rawReps = convs.map(c => c.final[0]);
  const sqrtReps = rawReps.map(v => Math.sqrt(v));
  const cohs = convs.map(c => c.final[1]);

  // Transformed points for KDE
  const points = convs.map((c, i) => [sqrtReps[i], cohs[i]]);

  // Data extents on transformed space
  const xMin = 0;
  const xMax = d3.max(sqrtReps) * 1.15;
  const yMin = 0;
  const yMax = d3.max(cohs) * 1.15;

  // KDE grid
  const gridRes = 80;
  const gridX = d3.range(gridRes).map(i => xMin + (xMax - xMin) * i / (gridRes - 1));
  const gridY = d3.range(gridRes).map(i => yMin + (yMax - yMin) * i / (gridRes - 1));

  // Bandwidth — Silverman's rule
  const stdX = d3.deviation(sqrtReps) || 0.01;
  const stdY = d3.deviation(cohs) || 0.01;
  const bw = 0.9 * Math.min(stdX, stdY) * Math.pow(points.length, -0.2);

  const density = gaussianKDE(points, gridX, gridY, bw);
  const maxDensity = d3.max(density);

  // ---- Three.js ----
  const container = document.getElementById("container");
  const W = container.clientWidth, H = container.clientHeight;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x0D1117);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W / H, 0.01, 100);
  camera.position.set(1.9, 1.4, 1.9);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.12;
  controls.target.set(0.5, 0.2, 0.5);
  controls.update();

  // No directional light — just ambient to avoid shading artifacts
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));

  const heightScale = 0.7;

  // ---- Build wireframe surface ----
  // Custom geometry: manual vertices + indices for a grid
  const geo = new THREE.BufferGeometry();
  const vertCount = gridRes * gridRes;
  const positions = new Float32Array(vertCount * 3);
  const colors = new Float32Array(vertCount * 3);

  for (let ix = 0; ix < gridRes; ix++) {
    for (let iy = 0; iy < gridRes; iy++) {
      const vi = ix * gridRes + iy;
      const d = density[vi];
      const t = d / maxDensity;
      const h = t * heightScale;

      positions[vi * 3 + 0] = ix / (gridRes - 1); // scene x
      positions[vi * 3 + 1] = h;                    // scene y (height)
      positions[vi * 3 + 2] = iy / (gridRes - 1); // scene z

      const col = heightColor(t);
      colors[vi * 3 + 0] = col.r;
      colors[vi * 3 + 1] = col.g;
      colors[vi * 3 + 2] = col.b;
    }
  }

  // Line indices for grid wireframe (horizontal + vertical lines)
  const lineIndices = [];
  for (let ix = 0; ix < gridRes; ix++) {
    for (let iy = 0; iy < gridRes - 1; iy++) {
      lineIndices.push(ix * gridRes + iy, ix * gridRes + iy + 1);
    }
  }
  for (let iy = 0; iy < gridRes; iy++) {
    for (let ix = 0; ix < gridRes - 1; ix++) {
      lineIndices.push(ix * gridRes + iy, (ix + 1) * gridRes + iy);
    }
  }

  geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geo.setAttribute("color", new THREE.BufferAttribute(colors, 3));
  geo.setIndex(lineIndices);

  const wireMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.7,
  });
  scene.add(new THREE.LineSegments(geo, wireMat));

  // ---- Floor contour lines ----
  const contourPixels = 256;
  const cxScale = d3.scaleLinear().domain([xMin, xMax]).range([0, contourPixels]);
  const cyScale = d3.scaleLinear().domain([yMin, yMax]).range([0, contourPixels]);

  const contourData = d3.contourDensity()
    .x(d => cxScale(d[0]))
    .y(d => cyScale(d[1]))
    .size([contourPixels, contourPixels])
    .bandwidth(bw / (xMax - xMin) * contourPixels * 0.7)
    .thresholds(10)
    (points);

  contourData.forEach(contour => {
    const t = contour.value / d3.max(contourData, d => d.value);
    const col = heightColor(t);
    contour.coordinates.forEach(polygon => {
      polygon.forEach(ring => {
        const pts = ring.map(([cx, cy]) =>
          new THREE.Vector3(cx / contourPixels, -0.002, cy / contourPixels)
        );
        if (pts.length < 2) return;
        const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
        const lineMat = new THREE.LineBasicMaterial({
          color: col,
          transparent: true,
          opacity: 0.5,
        });
        scene.add(new THREE.Line(lineGeo, lineMat));
      });
    });
  });

  // ---- Floor grid ----
  const gridMat = new THREE.LineBasicMaterial({ color: 0x21262D, transparent: true, opacity: 0.3 });
  for (let i = 0; i <= 10; i++) {
    const v = i / 10;
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(v, -0.003, 0), new THREE.Vector3(v, -0.003, 1)
      ]), gridMat
    ));
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, -0.003, v), new THREE.Vector3(1, -0.003, v)
      ]), gridMat
    ));
  }

  // ---- Axes ----
  const axisMat = new THREE.LineBasicMaterial({ color: 0x484F58 });
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(1.08,0,0)]), axisMat
  ));
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0, heightScale*1.1, 0)]), axisMat
  ));
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,1.08)]), axisMat
  ));

  // ---- Labels ----
  function makeLabel(text, position, fontSize) {
    fontSize = fontSize || 0.035;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 256; canvas.height = 64;
    ctx.fillStyle = "#8B949E";
    ctx.font = `${Math.round(fontSize * 500)}px -apple-system, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(text, 128, 32);
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.position.copy(position);
    sprite.scale.set(0.28, 0.07, 1);
    return sprite;
  }

  // X ticks — show original (non-sqrt) values
  for (let i = 0; i <= 4; i++) {
    const frac = i / 4;
    const sqrtVal = xMin + (xMax - xMin) * frac;
    const origVal = sqrtVal * sqrtVal; // inverse sqrt
    scene.add(makeLabel(origVal.toFixed(3), new THREE.Vector3(frac, -0.04, 1.06)));
  }
  scene.add(makeLabel("Repetitiveness (sqrt)", new THREE.Vector3(0.5, -0.07, 1.14), 0.038));

  // Z ticks — coherence
  for (let i = 0; i <= 4; i++) {
    const frac = i / 4;
    const val = yMin + (yMax - yMin) * frac;
    scene.add(makeLabel(val.toFixed(2), new THREE.Vector3(-0.07, -0.04, frac)));
  }
  scene.add(makeLabel("Coherence", new THREE.Vector3(-0.1, -0.07, 0.5), 0.038));

  // Y label
  scene.add(makeLabel("Density", new THREE.Vector3(-0.07, heightScale * 0.5, -0.04), 0.038));

  // ---- Scatter dots on surface ----
  const dotPositions = [];
  const dotColors = [];

  convs.forEach((c, i) => {
    const nx = (sqrtReps[i] - xMin) / (xMax - xMin);
    const nz = (cohs[i] - yMin) / (yMax - yMin);
    const gx = Math.min(gridRes - 1, Math.max(0, Math.round(nx * (gridRes - 1))));
    const gz = Math.min(gridRes - 1, Math.max(0, Math.round(nz * (gridRes - 1))));
    const d = density[gx * gridRes + gz];
    const h = (d / maxDensity) * heightScale + 0.005;

    dotPositions.push(nx, h, nz);
    const col = new THREE.Color(COND_COLOR[c.condition] || "#fff");
    dotColors.push(col.r, col.g, col.b);
  });

  const dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute("position", new THREE.Float32BufferAttribute(dotPositions, 3));
  dotGeo.setAttribute("color", new THREE.Float32BufferAttribute(dotColors, 3));
  const dotMat = new THREE.PointsMaterial({
    size: 0.015,
    sizeAttenuation: true,
    vertexColors: true,
  });
  scene.add(new THREE.Points(dotGeo, dotMat));

  // ---- Legend ----
  const legendEl = document.getElementById("legend");
  CONDITIONS.forEach(c => {
    const n = convs.filter(d => d.condition === c.key).length;
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `<div class="legend-swatch" style="background:${c.color}"></div><span>${c.label} (${n})</span>`;
    legendEl.appendChild(item);
  });

  // ---- Resize ----
  window.addEventListener("resize", () => {
    const nw = container.clientWidth, nh = container.clientHeight;
    camera.aspect = nw / nh;
    camera.updateProjectionMatrix();
    renderer.setSize(nw, nh);
  });

  // ---- Render ----
  (function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  })();
}

init();
</script>
</body>
</html>
